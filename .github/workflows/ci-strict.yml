name: CI (Strict)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-strict-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ============================================
  # Job: Dependency Integrity Check
  # ============================================
  lockfile-check:
    name: 🔒 Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify uv.lock is up to date
        run: |
          uv sync --locked || (
            echo "❌ uv.lock is out of date. Run 'uv sync' locally and commit the changes."
            exit 1
          )

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Verify pnpm-lock.yaml is up to date
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile || (
            echo "❌ pnpm-lock.yaml is out of date. Run 'pnpm install' in ui/ locally and commit the changes."
            exit 1
          )

  # ============================================
  # Job: Python Backend Checks
  # ============================================
  backend:
    name: 🐍 Backend
    runs-on: ubuntu-latest
    needs: lockfile-check
    strategy:
      fail-fast: true
      matrix:
        check: [format, lint, typecheck, security, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      # Format Check
      - name: Check Python formatting
        if: matrix.check == 'format'
        run: uv run ruff format --check swarmmind/ tests/

      # Lint
      - name: Run Python linter
        if: matrix.check == 'lint'
        run: uv run ruff check swarmmind/ tests/

      # Type Check
      - name: Run Python type checker
        if: matrix.check == 'typecheck'
        run: uv run mypy swarmmind/

      # Security (report only, don't fail build)
      - name: Run Python security checks
        if: matrix.check == 'security'
        run: |
          uv run bandit -r swarmmind/ -f json -o bandit-report.json || true
          uv run bandit -r swarmmind/ || true
        continue-on-error: true

      # Test with Coverage (skip LLM tests in CI)
      - name: Run Python tests with coverage
        if: matrix.check == 'test'
        run: uv run python -m pytest tests/ -v -m "not requires_llm" --cov=swarmmind --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.check == 'test'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # Job: Frontend Checks
  # ============================================
  frontend:
    name: ⚛️ Frontend
    runs-on: ubuntu-latest
    needs: lockfile-check
    strategy:
      fail-fast: true
      matrix:
        check: [lint, typecheck, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      # Lint
      - name: Run ESLint
        if: matrix.check == 'lint'
        working-directory: ui
        run: pnpm run lint

      # Type Check
      - name: Run TypeScript type check
        if: matrix.check == 'typecheck'
        working-directory: ui
        run: pnpm run typecheck

      # Build (skip tsc check, use vite build directly for now due to existing type issues)
      - name: Build for production
        if: matrix.check == 'build'
        working-directory: ui
        run: npx vite build

  # ============================================
  # Job: Security Audit
  # ============================================
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    needs: lockfile-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install Node dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Run npm security audit
        working-directory: ui
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Check for known vulnerabilities (Node)
        working-directory: ui
        run: |
          pnpm audit --json > audit-report.json || true
          if [ -s audit-report.json ]; then
            CRITICAL=$(jq '[.advisories[]? | select(.severity == "critical")] | length' audit-report.json || echo "0")
            HIGH=$(jq '[.advisories[]? | select(.severity == "high")] | length' audit-report.json || echo "0")
            if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "❌ Found $CRITICAL critical and $HIGH high severity vulnerabilities"
              exit 1
            fi
          fi
          echo "✅ No critical or high severity vulnerabilities found"

      - name: Run GitHub CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================
  # Job: Spell Check
  # ============================================
  spellcheck:
    name: 📝 Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1.21.0
        with:
          files: .
          config: ./typos.toml

  # ============================================
  # Job: Summary
  # ============================================
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, security-audit, spellcheck]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Spell Check: ${{ needs.spellcheck.result }}"

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ CI failed"
          exit 1

      - name: Success
        run: echo "✅ All CI checks passed!"
