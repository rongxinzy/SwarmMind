name: CI (Strict)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-strict-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  # Required for tests that need LLM configuration
  LLM_MODEL: gpt-4o-mini
  LLM_PROVIDER: openai
  # Use official PyPI in CI (override any mirror settings)
  UV_INDEX_URL: "https://pypi.org/simple/"

jobs:
  # ============================================
  # Job: Dependency Integrity Check
  # ============================================
  lockfile-check:
    name: 🔒 Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify uv.lock uses official PyPI
        run: |
          if grep -q "mirrors.tuna.tsinghua.edu.cn" uv.lock; then
            echo "❌ uv.lock contains Tsinghua mirror URLs. Run 'uv lock' locally to regenerate with official PyPI."
            exit 1
          fi
          uv sync --locked

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Verify pnpm-lock.yaml is up to date
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile || (
            echo "❌ pnpm-lock.yaml is out of date. Run 'pnpm install' in ui/ locally and commit the changes."
            exit 1
          )

  # ============================================
  # Job: Python Backend Checks
  # ============================================
  backend:
    name: 🐍 Backend
    runs-on: ubuntu-latest
    needs: lockfile-check
    strategy:
      fail-fast: true
      matrix:
        check: [format, lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      # Format Check
      - name: Check Python formatting
        if: matrix.check == 'format'
        run: uv run ruff format --check swarmmind/ tests/

      # Lint
      - name: Run Python linter
        if: matrix.check == 'lint'
        run: uv run ruff check swarmmind/ tests/

      # Test with Coverage (skip LLM tests in CI)
      - name: Run Python tests with coverage
        if: matrix.check == 'test'
        run: uv run python -m pytest tests/ -v -m "not requires_llm" --cov=swarmmind --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.check == 'test'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # Job: Frontend Checks
  # ============================================
  frontend:
    name: ⚛️ Frontend
    runs-on: ubuntu-latest
    needs: lockfile-check
    strategy:
      fail-fast: true
      matrix:
        check: [lint, typecheck, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      # Lint
      - name: Run ESLint
        if: matrix.check == 'lint'
        working-directory: ui
        run: pnpm run lint

      # Type Check
      - name: Run TypeScript type check
        if: matrix.check == 'typecheck'
        working-directory: ui
        run: pnpm run typecheck

      # Build
      - name: Build for production
        if: matrix.check == 'build'
        working-directory: ui
        run: pnpm run build

  # ============================================
  # Job: Spell Check
  # ============================================
  spellcheck:
    name: 📝 Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1.21.0
        with:
          files: .
          config: ./typos.toml

  # ============================================
  # Job: Summary
  # ============================================
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, spellcheck]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Spell Check: ${{ needs.spellcheck.result }}"

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ CI failed"
          exit 1

      - name: Success
        run: echo "✅ All CI checks passed!"
