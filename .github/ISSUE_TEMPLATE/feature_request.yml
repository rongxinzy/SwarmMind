name: ✨ 功能建议 / Feature Request
description: 提议新功能或改进
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        在提议新功能前，请确认它与项目当前阶段（参见 [docs/roadmap.md](../docs/roadmap.md)）相符。
        SwarmMind 目前聚焦在 P0/P1 主路径，与企业 Agent 控制平面无关的提议可能不会被采纳。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem statement
      description: 描述当前的痛点或缺失的能力，而不是直接提解决方案。
      placeholder: |
        作为 <角色>，我在 <场景> 下遇到 <问题>，因为 <原因>。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed solution
      description: 你设想的实现方式；可以包含 UI 草图、API 设计、数据模型等。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案 / Alternatives considered
      description: 还想过哪些做法？为什么没选？

  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围 / Scope
      options:
        - Backend / API
        - Frontend / UI
        - 治理与审批 / Governance & Approval
        - 上下文层 / Governed Context
        - 集成 / Connectors
        - 文档 / Docs
        - 其他 / Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 issue 和 roadmap，没有重复
          required: true
        - label: 我理解并非所有功能建议都会被实现
          required: true
