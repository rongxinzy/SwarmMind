[files]
extend-exclude = [
    "*.lock",
    "*.json",
    "*.svg",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.gif",
    "*.ico",
    "*.woff",
    "*.woff2",
    "*.ttf",
    "*.eot",
    "*.mp4",
    "*.webm",
    "*.mp3",
    "*.wav",
    "*.db",
    "dist/**",
    "node_modules/**",
    ".venv/**",
    "__pycache__/**",
    ".git/**",
    ".pytest_cache/**",
]

[default]
extend-ignore-identifiers-re = [
    # Add project-specific identifiers to ignore here
]

[default.extend-words]
# Add project-specific word mappings here
# example = "example"
Hashi = "Hashi"
